services:
  postgres:
    image: postgres:17-alpine
    container_name: gbb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: baby_photo
      POSTGRES_PASSWORD: baby_photo_2024
      POSTGRES_DB: baby_photo
    expose:
      - "5432"
    volumes:
      - /app/postgres/data:/var/lib/postgresql/data
    networks:
      - gbb-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baby_photo -d baby_photo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gbb-redis
    restart: unless-stopped
    command: redis-server --requirepass gbb_redis_2024
    expose:
      - "6379"
    networks:
      - gbb-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "gbb_redis_2024", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: baby-photo-backend:latest
    container_name: gbb-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://baby_photo:baby_photo_2024@postgres:5432/baby_photo_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: gbb_redis_2024
      JWT_SECRET: gbb-server-jwt-secret-2024-random-xyz-abc-9876543210
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001,http://localhost:8080,http://guaibaobao.net,http://guaibaobao.cn
      NODE_ENV: production
    networks:
      - gbb-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: gbb-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/gbb/storefront:/usr/share/nginx/html:ro
      - /opt/gbb/admin-frontend:/usr/share/nginx/html/admin:ro
      - /opt/gbb/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - gbb-network

networks:
  gbb-network:
    driver: bridge
