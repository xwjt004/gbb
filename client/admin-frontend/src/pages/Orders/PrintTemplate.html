<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订单详情打印模板</title>
  <style>
    @media print {
      @page { size: A4; margin: 10mm; }
      body { margin: 0; padding: 0; }
    }
    
    * { box-sizing: border-box; }
    
    body {
      font-family: "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.5;
      color: #333;
      font-size: 12px;
      margin: 0;
      padding: 0;
    }
    
    .container {
      border: 2px solid #1890ff;
      max-width: 210mm;
      margin: 0 auto;
    }
    
    /* 头部样式 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      border-bottom: 2px solid #1890ff;
      background: linear-gradient(to right, #e6f7ff, #f0f8ff);
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .logo {
      width: 35px;
      height: 35px;
      background: #ffa500;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    
    .shop-name {
      font-size: 16px;
      font-weight: bold;
      color: #1890ff;
    }
    
    .header-right {
      text-align: right;
    }
    
    .header-title {
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 3px;
    }
    
    .order-no {
      font-size: 11px;
      color: #999;
    }
    
    /* 主内容区 */
    .main-content {
      display: flex;
    }
    
    .left-column {
      flex: 60%;
      border-right: 1px solid #e8e8e8;
    }
    
    .right-column {
      flex: 40%;
      background: #fafafa;
    }
    
    .section {
      padding: 12px 15px;
      border-bottom: 1px solid #e8e8e8;
    }
    
    .section-title {
      font-weight: bold;
      font-size: 13px;
      margin-bottom: 8px;
      padding-bottom: 5px;
      border-bottom: 1px solid #e8e8e8;
    }
    
    .info-row {
      margin: 5px 0;
      display: flex;
      font-size: 12px;
    }
    
    .label {
      color: #666;
      min-width: 70px;
      flex-shrink: 0;
    }
    
    .value {
      color: #333;
      flex: 1;
    }
    
    .value-highlight {
      color: #1890ff;
      font-weight: 600;
    }
    
    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    
    /* 商品网格 */
    .items-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 8px;
    }
    
    .item-card {
      padding: 6px;
      border: 1px solid #e6f7ff;
      border-radius: 3px;
      background: #f0f8ff;
    }
    
    .item-header {
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .item-type {
      display: inline-block;
      padding: 1px 6px;
      color: white;
      border-radius: 2px;
      font-size: 10px;
    }
    
    .item-name {
      font-size: 11px;
      font-weight: 600;
      margin-left: 4px;
    }
    
    .item-price {
      font-weight: bold;
      font-size: 11px;
      color: #ff4d4f;
    }
    
    .item-details {
      font-size: 10px;
      color: #666;
      line-height: 1.5;
    }
    
    /* 费用信息 */
    .amount-section {
      border-top: 2px solid #1890ff;
      background: #fff;
    }
    
    .amount-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 10px;
    }
    
    /* 底部信息 */
    .footer-section {
      padding: 12px 15px;
      border-top: 1px solid #e8e8e8;
      background: #fafafa;
    }
    
    .signature-area {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 12px;
    }
    
    .signature-box {
      text-align: center;
      padding: 8px;
      border: 1px dashed #ccc;
    }
    
    .signature-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 20px;
    }
    
    .signature-line {
      border-top: 1px solid #333;
      margin: 0 20px;
      padding-top: 5px;
      font-size: 10px;
      color: #999;
    }
    
    .shop-info {
      margin-top: 12px;
      padding: 10px;
      background: #e6f7ff;
      border: 1px solid #1890ff;
      border-radius: 4px;
    }
    
    .shop-info-title {
      font-size: 12px;
      font-weight: bold;
      color: #1890ff;
      margin-bottom: 6px;
      text-align: center;
      padding-bottom: 4px;
      border-bottom: 1px solid #1890ff;
    }
    
    .shop-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      font-size: 11px;
    }
    
    .footer-note {
      margin-top: 10px;
      text-align: center;
      font-size: 10px;
      color: #999;
    }
  </style>
</head>
<body>
  <!-- 此为模板文件,实际内容由 TypeScript 生成 -->
</body>
</html>
