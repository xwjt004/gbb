name: Docker Build (main)

on:
  push:
    branches: [main]
    paths:
      - 'server/baby-photo-backend/**'
      - 'client/admin-frontend/**'
      - 'docker-compose*.yml'
      - '.github/workflows/docker-build.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: server/baby-photo-backend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ secrets.DOCKER_USERNAME }}/gbb-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: client/admin-frontend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ secrets.DOCKER_USERNAME }}/gbb-frontend:latest
