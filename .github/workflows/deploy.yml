name: Deploy

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        type: choice
        options:
          - staging
          - production
        default: staging

env:
  NODE_VERSION: 20
  DEPLOY_ENV: ${{ github.event.inputs.environment || 'production' }}

jobs:
  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: server/baby-photo-backend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/gbb-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/gbb-backend:${{ steps.version.outputs.VERSION }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: client/admin-frontend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/gbb-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/gbb-frontend:${{ steps.version.outputs.VERSION }}

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - name: Check required secrets
        id: check
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "SSH_HOST not configured — skipping deploy"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip == 'false'

      - name: Setup SSH
        if: steps.check.outputs.skip == 'false'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        if: steps.check.outputs.skip == 'false'
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ${{ secrets.SSH_DEPLOY_PATH }} \
            && docker compose pull \
            && docker compose up -d \
            && echo 'Deployment successful'"

      - name: Health check
        if: steps.check.outputs.skip == 'false'
        run: |
          sleep 10
          curl -sf https://${{ secrets.SSH_HOST }}/api/v1/health \
            && echo "Health check passed" \
            || echo "Health check failed (check server manually)"
